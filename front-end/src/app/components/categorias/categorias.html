<div class="app-container">
    <app-nabvar></app-nabvar>
    <!-- categorias/categorias.component.html -->
    <!-- categorias/categorias.component.html -->
    <div class="categorias-container">
      <div class="categorias-header">
        <div>
          <h2 class="azul-marino mb-2 title">Categorías de gastos</h2>
          <p class="text-muted">Organiza según la necesidad de tus categorías</p>
        </div>
        <button class="btn-add-category" (click)="openAddModal()">
          <i class="bi bi-plus-lg me-2"></i>
          Agregar Nueva
        </button>
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="error" class="alert alert-danger mb-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        {{ error }}
      </div>

      <!-- Lista de categorías -->
      <div class="categories-grid">
        <div *ngFor="let category of categories" class="category-card">
            <span>{{category.nombre}}</span>
            <i [class]="category.icono"></i>
          </div>
          <div class="category-actions">
            
          </div>
        </div>
      </div>

      <!-- Mensaje cuando no hay categorías -->
      <div *ngIf="categories.length === 0" class="empty-state">
        <i class="bi bi-tags fs-1 text-muted"></i>
        <p class="text-muted mt-3">No hay categorías creadas</p>
        <button class="btn-add-category mt-3" (click)="openAddModal()">
          <i class="bi bi-plus-lg me-2"></i>
          Crear tu primera categoría
        </button>
      </div>
      <!-- Modal para agregar/editar categoría -->
    <div class="modal" [class.show]="showModal" (click)="closeModal()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
          <h4 class="modal-title">
            {{ editingCategory ? 'Editar Categoría' : 'Nueva Categoría' }}
          </h4>
          <button class="btn-close-modal" (click)="closeModal()">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>

        <div class="modal-body">
          <!-- Nombre de la categoría -->
          <div class="form-group mb-4">
            <label class="form-label">Nombre de la categoría</label>
            <input 
              type="text" 
              class="form-control"
              [(ngModel)]="newCategory.nombre"
              placeholder="Ej: Supermercado, Gasolina, Cine..."
              autofocus
            />
          </div>

          <!-- Selector de iconos -->
          <div class="form-group mb-4">
            <label class="form-label mb-2">Selecciona un icono</label>
            <div class="icons-grid">
              <div 
                *ngFor="let icon of availableIcons" 
                class="icon-option"
                [class.selected]="newCategory.icono === icon.value"
                (click)="selectIcon(icon.value)"
                title="{{ icon.name }}">
                <i [class]="icon.value"></i>
              </div>
            </div>
          </div>

          
        </div>

        <div class="modal-footer">
          <button class="btn-cancel" (click)="closeModal()">Cancelar</button>
          <button class="btn-save" (click)="saveCategory()" [disabled]="!newCategory.nombre.trim()">
            <i class="bi bi-check-lg me-2"></i>
            {{ editingCategory ? 'Actualizar' : 'Guardar' }}
          </button>
        </div>
      </div>
    </div>
</div>
